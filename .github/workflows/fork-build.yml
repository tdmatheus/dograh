name: Fork Build (GHCR)

# Fork-specific image build for tdmatheus/dograh.
# Builds dograh-api and dograh-ui and pushes them to GitHub Container Registry
# (ghcr.io/tdmatheus/dograh-*) using the built-in GITHUB_TOKEN — no external
# registry account or secrets required. Kept separate from upstream's
# docker-image.yml so syncing upstream never conflicts with this.
#
# Deploy consumes these via REGISTRY=ghcr.io/tdmatheus in the Coolify compose.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Extra image tag to publish (in addition to latest + sha)."
        required: false
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: fork-build-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  # Lowercased owner — GHCR image names must be lowercase.
  OWNER: tdmatheus

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: dograh-api
            dockerfile: api/Dockerfile
          - name: dograh-ui
            dockerfile: ui/Dockerfile
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
