# Dograh on Coolify (linode-us-lax1 / 172.235.57.223) — rejuto.motorbrain.net
#
# Adapted from upstream docker-compose.yaml for a Coolify-managed server where
# Coolify's Traefik proxy owns :80/:443 and terminates TLS:
#
#   - Dograh's bundled nginx is REMOVED (Traefik replaces it). The three nginx
#     routes from deploy/templates/nginx.remote.conf.template are reproduced
#     1:1 as Traefik labels:
#         /api/v1/     -> api:8000    (WebSockets, long-lived audio streams)
#         /voice-audio -> minio:9000  (browser fetches recordings; bucket name
#                                      IS the path, so NO prefix stripping)
#         /            -> ui:3010
#   - dograh-init is REMOVED (it only rendered nginx/coturn config). coturn is
#     configured via CLI flags reproducing deploy/templates/turnserver.remote.conf.template.
#   - coturn keeps HOST-published ports (Traefik cannot proxy UDP): 3478,
#     5349 (tcp+udp) and the 49152-49200/udp relay range, with
#     external-ip=${SERVER_IP} (172.235.57.223).
#   - postgres/redis/minio/api/ui host port publishing REMOVED (upstream compose
#     publishes 5432/6379/8000/3010 on the host — unnecessary and unsafe behind
#     Traefik; everything is reached over the Docker network).
#   - container_name entries removed (avoids collisions with other Coolify
#     resources on the same host).
#
# The API derives BACKEND_API_ENDPOINT, MINIO_PUBLIC_ENDPOINT and TURN_HOST
# from PUBLIC_BASE_URL / PUBLIC_HOST (api/constants.py), so only the canonical
# env vars are set. MinIO recording URLs therefore come out as
# https://rejuto.motorbrain.net/voice-audio/... and hit the Traefik route above.
#
# Coolify usage: create a "Docker Compose" resource on server linode-us-lax1
# with this file, enable "Connect To Predefined Network", leave the per-service
# Domains fields EMPTY (all routing is done by the explicit labels below), and
# set the environment variables from .env.dograh.example.
#
# NOTE: FASTAPI_WORKERS must stay 1. The api image spawns one uvicorn process
# per worker on CONSECUTIVE ports (8000, 8001, ...) expecting nginx to balance
# across them (scripts/start_services_docker.sh). Traefik's docker provider
# routes to a single container port, so extra workers would sit idle.

services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      # Baked into the data volume on first init — do not change afterwards.
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}"
      POSTGRES_DB: postgres
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    restart: unless-stopped
    command: >
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 3s
      timeout: 10s
      retries: 10

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:?MINIO_ROOT_USER must be set}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set}"
      MINIO_API_CORS_ALLOW_ORIGIN: "${PUBLIC_BASE_URL}"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      # Public route for browser access to call recordings:
      #   https://rejuto.motorbrain.net/voice-audio/<object>
      # The path is the S3 bucket name — it MUST reach MinIO unstripped
      # (upstream nginx proxied /voice-audio/ -> minio:9000/voice-audio/).
      - traefik.enable=true
      - "traefik.http.middlewares.gzip.compress=true"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.routers.dograh-minio-http.rule=Host(`rejuto.motorbrain.net`) && PathPrefix(`/voice-audio`)"
      - "traefik.http.routers.dograh-minio-http.entryPoints=http"
      - "traefik.http.routers.dograh-minio-http.middlewares=redirect-to-https"
      - "traefik.http.routers.dograh-minio-http.service=dograh-minio"
      - "traefik.http.routers.dograh-minio-https.rule=Host(`rejuto.motorbrain.net`) && PathPrefix(`/voice-audio`)"
      - "traefik.http.routers.dograh-minio-https.entryPoints=https"
      - "traefik.http.routers.dograh-minio-https.tls=true"
      - "traefik.http.routers.dograh-minio-https.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dograh-minio-https.service=dograh-minio"
      - "traefik.http.services.dograh-minio.loadbalancer.server.port=9000"

  coturn:
    image: coturn/coturn:4.8.0
    restart: unless-stopped
    # HOST networking: TURN relays must bind directly to the host NIC.
    # Under Docker bridge + docker-proxy, the published relay ports do not
    # actually accept external traffic (self->public-IP:3478 = connection
    # refused), breaking WebRTC media. network_mode: host makes coturn bind
    # 3478/5349 + the 49152-49200 relay range straight on the host, matching
    # deploy/templates/turnserver.remote.conf.template. With host networking
    # the `ports:` mapping is removed (the container uses host ports directly).
    network_mode: host
    command:
      - --listening-port=3478
      - --tls-listening-port=5349
      - --min-port=49152
      - --max-port=49200
      - --external-ip=${SERVER_IP:?SERVER_IP must be set}
      - --realm=dograh.com
      - --use-auth-secret
      - --static-auth-secret=${TURN_SECRET:?TURN_SECRET must be set}
      - --fingerprint
      - --no-cli
      - --no-multicast-peers
      - --log-file=stdout

  api:
    image: ${REGISTRY:-dograhai}/dograh-api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      ENVIRONMENT: "${ENVIRONMENT:-production}"
      LOG_LEVEL: "INFO"

      # Canonical public origin. BACKEND_API_ENDPOINT, MINIO_PUBLIC_ENDPOINT
      # and TURN_HOST are derived from these in api/constants.py.
      PUBLIC_BASE_URL: "${PUBLIC_BASE_URL:?PUBLIC_BASE_URL must be set}"
      PUBLIC_HOST: "${PUBLIC_HOST:?PUBLIC_HOST must be set}"

      DATABASE_URL: "postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379"

      # Bundled MinIO (not AWS S3)
      ENABLE_AWS_S3: "false"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_PUBLIC_ENDPOINT: "${MINIO_PUBLIC_ENDPOINT:-}"
      MINIO_ACCESS_KEY: "${MINIO_ROOT_USER}"
      MINIO_SECRET_KEY: "${MINIO_ROOT_PASSWORD}"
      MINIO_BUCKET: "voice-audio"
      MINIO_SECURE: "false"

      # Must stay 1 behind Traefik — see header note.
      FASTAPI_WORKERS: "${FASTAPI_WORKERS:-1}"

      # Trust X-Forwarded-Proto from Traefik (reaches uvicorn from a Docker
      # network IP). Required for webhook signature verification over https.
      # Port 8000 is NOT host-published here, so "*" is safe.
      FORWARDED_ALLOW_IPS: "*"

      # TURN (time-limited credentials via TURN REST API / HMAC-SHA1)
      TURN_SECRET: "${TURN_SECRET}"
      FORCE_TURN_RELAY: "${FORCE_TURN_RELAY:-false}"

      OSS_JWT_SECRET: "${OSS_JWT_SECRET:?OSS_JWT_SECRET must be set to a strong secret}"

      ENABLE_TELEMETRY: "${ENABLE_TELEMETRY:-false}"
      POSTHOG_API_KEY: "phc_ItizB1dP6yv7ZYobbcqrpxTdbomDA8hJFSEmAMdYvIr"
      POSTHOG_HOST: "https://us.i.posthog.com"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8000/api/v1/health'').read()"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      # Browser + webhooks hit the API same-origin under /api/v1
      # (ui/src/lib/apiClient.ts falls back to window.location.origin).
      # Upstream nginx: WS upgrade, 3600s read timeout, no buffering —
      # Traefik handles WebSocket upgrades natively and does not buffer.
      - traefik.enable=true
      - "traefik.http.middlewares.gzip.compress=true"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.routers.dograh-api-http.rule=Host(`rejuto.motorbrain.net`) && PathPrefix(`/api/v1`)"
      - "traefik.http.routers.dograh-api-http.entryPoints=http"
      - "traefik.http.routers.dograh-api-http.middlewares=redirect-to-https"
      - "traefik.http.routers.dograh-api-http.service=dograh-api"
      - "traefik.http.routers.dograh-api-https.rule=Host(`rejuto.motorbrain.net`) && PathPrefix(`/api/v1`)"
      - "traefik.http.routers.dograh-api-https.entryPoints=https"
      - "traefik.http.routers.dograh-api-https.tls=true"
      - "traefik.http.routers.dograh-api-https.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dograh-api-https.service=dograh-api"
      - "traefik.http.services.dograh-api.loadbalancer.server.port=8000"

  ui:
    image: ${REGISTRY:-dograhai}/dograh-ui:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      HOSTNAME: "0.0.0.0"
      # SSR reaches the API over the internal Docker network.
      BACKEND_URL: "http://api:8000"
      NODE_ENV: "oss"
      ENABLE_TELEMETRY: "${ENABLE_TELEMETRY:-false}"
      POSTHOG_KEY: "phc_ItizB1dP6yv7ZYobbcqrpxTdbomDA8hJFSEmAMdYvIr"
      POSTHOG_HOST: "https://us.posthog.com"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://127.0.0.1:3010 || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      # Catch-all root route. Traefik prefers the longer /api/v1 and
      # /voice-audio rules automatically (rule-length priority).
      - traefik.enable=true
      - "traefik.http.middlewares.gzip.compress=true"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.routers.dograh-ui-http.rule=Host(`rejuto.motorbrain.net`) && PathPrefix(`/`)"
      - "traefik.http.routers.dograh-ui-http.entryPoints=http"
      - "traefik.http.routers.dograh-ui-http.middlewares=redirect-to-https"
      - "traefik.http.routers.dograh-ui-http.service=dograh-ui"
      - "traefik.http.routers.dograh-ui-https.rule=Host(`rejuto.motorbrain.net`) && PathPrefix(`/`)"
      - "traefik.http.routers.dograh-ui-https.entryPoints=https"
      - "traefik.http.routers.dograh-ui-https.tls=true"
      - "traefik.http.routers.dograh-ui-https.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dograh-ui-https.service=dograh-ui"
      - "traefik.http.routers.dograh-ui-https.middlewares=gzip"
      - "traefik.http.services.dograh-ui.loadbalancer.server.port=3010"

volumes:
  postgres_data:
  redis_data:
  minio-data:
    driver: local
